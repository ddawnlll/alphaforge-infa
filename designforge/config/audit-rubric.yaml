# DesignForge — Audit Rubric Configuration
# Used by VLM audit and Design Judge for standardized evaluation

scoring:
  dimensions:
    visual_quality:
      weight: 0.25
      indicators:
        - color_harmony: "Are colors complementary? No clashing? WCAG contrast?"
        - typography: "Font pairing works? Hierarchy clear? Readable at all sizes?"
        - composition: "Layout balanced? Whitespace used well? Visual rhythm?"
        - consistency: "Design language consistent across all sections?"
      min_pass: 4
      description: "Aesthetics, color harmony, typography, composition"

    commercial_fit:
      weight: 0.25
      indicators:
        - cta_clarity: "Primary CTA immediately visible? Clear action?"
        - trust_signals: "Logos, testimonials, certifications, awards present?"
        - industry_match: "Design appropriate for this industry/sector?"
        - conversion_path: "Clear path from visitor → lead/customer?"
      min_pass: 5  # Hard veto threshold
      description: "Does this design serve the business goal?"
      veto: true  # If < min_pass, automatic reject

    usability:
      weight: 0.20
      indicators:
        - navigation: "Can user find what they need in 3 seconds?"
        - readability: "Body text legible? Line height? Font size >= 16px?"
        - mobile: "Mobile layout functional and pleasant?"
        - loading: "Perceived load speed OK?"
      min_pass: 4
      description: "Navigation clarity, readability, mobile experience"

    brand_distinctiveness:
      weight: 0.15
      indicators:
        - memorability: "Would you remember this site after closing the tab?"
        - generic_detection: "AI slop? Template feel? Stock vibes?"
        - uniqueness: "Does it stand out from competitors?"
        - personality: "Does the design have character/voice?"
      min_pass: 3
      description: "Unique or generic? Memorable or forgettable?"

    performance:
      weight: 0.10
      indicators:
        - lighthouse_performance: "Target: 90+"
        - lighthouse_accessibility: "Target: 90+"
        - lighthouse_seo: "Target: 90+"
        - core_web_vitals: "LCP < 2.5s, FID < 100ms, CLS < 0.1"
      min_pass: 3
      description: "Lighthouse scores, Core Web Vitals"

    motion_quality:
      weight: 0.05
      indicators:
        - purpose: "Motion serves a purpose or just decoration?"
        - smoothness: "60fps? No jank?"
        - reduced_motion: "Respects prefers-reduced-motion?"
        - timing: "Duration and easing feel right?"
      min_pass: 2
      description: "Motion enhances or distracts?"

  final_score_formula: "weighted_average"
  reject_if_any_dimension_below_min_pass: true
  allow_conditional_approve: true  # "Approve with fix list"

design_sloth_detection:
  # Patterns that indicate AI slop / generic template
  red_flags:
    - "standard_ai_gradient"  # Purple-blue mesh gradient hero
    - "generic_saas_icon_set"  # Same phosphor/lucide icons everyone uses
    - "default_tailwind_font"  # Inter or system font with no character choices
    - "no_custom_illustration"  # Everything is stock or generated generic
    - "template_section_order"  # Hero→Features→Pricing→FAQ→CTA (no thought given)
    - "no_surprise_element"  # Every section predictable, no signature moment
    - "missing_brand_personality"  # Could be any SaaS, not a specific brand

  action_on_red_flags: "FLAG_IN_BLUEPRINT — designer must address before approval"

# Few-shot examples for VLM audit
vlm_few_shot_critiques:
  - url: "https://giydiriyo.com"
    critique: |
      VISUAL: Clean but generic. Tailwind default tokens, no character.
      COMMERCIAL: CTA exists but weak. Trust signals missing.
      BRAND: This could be 500 different companies. No personality.
      VERDICT: Functional but forgettable. Needs brand DNA injection.

  - url: "https://pacificnwxray.com"
    critique: |
      VISUAL: 2002 aesthetic. Blue gradient, no mobile layout.
      COMMERCIAL: Company is real, products exist, but site kills trust.
      USABILITY: Navigation is a maze. Search barely works.
      BRAND: Accidental personality from being so outdated.
      VERDICT: Perfect redesign candidate. Low cost, high impact.
